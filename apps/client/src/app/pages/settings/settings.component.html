<div class="settings-page">
  <div class="settings-card shadow-card">
    <button class="back-btn group flex items-center gap-1" (click)="router.navigate(['/chat'])">
      <span class="transition-transform duration-200 group-hover:-translate-x-0.5">←</span> Back to Chat
    </button>
    <h2 class="flex items-center gap-2">
      <span class="inline-block w-1 h-5 rounded-full bg-wa-green"></span>
      Account Settings
    </h2>

    <!-- Avatar Section -->
    <div class="section">
      <h3>Profile Photo</h3>
      <div class="avatar-section">
        <div class="avatar-preview ring-2 ring-wa-green/20 ring-offset-2 hover:ring-wa-green/50 transition-all duration-300" (click)="avatarInput.click()">
          @if (auth.user()?.avatarUrl) {
            <img [src]="auth.user()!.avatarUrl" alt="avatar" />
          } @else {
            <span class="avatar-letter">{{ auth.user()?.username?.charAt(0)?.toUpperCase() }}</span>
          }
          <div class="avatar-overlay">📷</div>
        </div>
        <input #avatarInput type="file" hidden accept="image/*" (change)="onAvatarSelected($event)" />
        <div class="avatar-info">
          <span class="avatar-name">{{ auth.user()?.username }}</span>
          <span class="avatar-hint">Click photo to change (max 2MB)</span>
        </div>
      </div>
      @if (avatarMsg()) {
        <div class="msg" [class.error]="avatarMsg()!.startsWith('Error')">{{ avatarMsg() }}</div>
      }
    </div>

    <!-- Password Section -->
    <div class="section">
      <h3>Change Password</h3>
      <form (ngSubmit)="changePassword()">
        <input class="transition-all duration-200 focus:shadow-glow-sm" [(ngModel)]="oldPassword" name="old" type="password" placeholder="Current password" required />
        <input class="transition-all duration-200 focus:shadow-glow-sm" [(ngModel)]="newPassword" name="new" type="password" placeholder="New password" required />
        <input class="transition-all duration-200 focus:shadow-glow-sm" [(ngModel)]="confirmPassword" name="confirm" type="password" placeholder="Confirm new password" required />
        <button class="transition-all duration-200 hover:shadow-glow active:scale-[0.98]" type="submit" [disabled]="!oldPassword || !newPassword || newPassword !== confirmPassword">Update Password</button>
      </form>
      @if (pwMsg()) {
        <div class="msg" [class.error]="pwMsg()!.startsWith('Error')">{{ pwMsg() }}</div>
      }
    </div>
  </div>
</div>
